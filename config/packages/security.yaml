security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    # Hierarquia de perfis de acesso da igreja
    role_hierarchy:
        ROLE_LIDER_MINISTERIO: [ROLE_USER]
        ROLE_DIACONO:          [ROLE_USER]
        ROLE_TESOUREIRO:       [ROLE_USER]
        ROLE_SECRETARIO:       [ROLE_USER]
        ROLE_PASTOR:           [ROLE_SECRETARIO, ROLE_TESOUREIRO, ROLE_DIACONO, ROLE_LIDER_MINISTERIO]
        ROLE_ADMIN:            [ROLE_PASTOR]
        ROLE_SUPER_ADMIN:      [ROLE_ADMIN, ROLE_ALLOWED_TO_SWITCH]

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            # Em produção acople JWT (lexik/jwt-authentication-bundle).
            # Aqui usamos http_basic para a base funcionar de imediato.
            http_basic: true

        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_dashboard
                username_parameter: email
                password_parameter: password
                enable_csrf: true
            # form_login:
            #     login_path: app_login
            #     check_path: app_login
            #     default_target_path: app_dashboard
            #     enable_csrf: true
            logout:
                path: app_logout
                target: app_login
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800

    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/tesouraria, roles: ROLE_TESOUREIRO }
        - { path: ^/api, roles: ROLE_USER }
        - { path: ^/tesouraria, roles: ROLE_TESOUREIRO }
        - { path: ^/diaconia, roles: ROLE_DIACONO }
        - { path: ^/pastoral, roles: ROLE_PASTOR }
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
